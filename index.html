// ─── EmailJS Configuration ───
// SETUP GUIDE: Follow these steps to enable email notifications
// 1. Go to https://www.emailjs.com and create a FREE account
// 2. Add an Email Service (Gmail, Outlook, etc) → copy the Service ID
// 3. Create an Email Template with these variables:
//    {{to_email}}, {{to_name}}, {{order_id}}, {{subject}}, {{message}}, {{company_name}}
//    Suggested template:
//      Subject: {{subject}}
//      To: {{to_email}}
//      Body:
//        Dear {{to_name}},
//        {{message}}
//        Order: {{order_id}}
//        From: {{company_name}}
// 4. Copy your Public Key from Account → API Keys
// 5. Replace the values below:
const EMAILJS_CONFIG = {
  enabled: false, // ← Change to true after setup
  publicKey: "YOUR_PUBLIC_KEY",       // ← From EmailJS Account → API Keys
  serviceId: "YOUR_SERVICE_ID",       // ← From EmailJS Email Services
  templateId: "YOUR_TEMPLATE_ID",     // ← From EmailJS Email Templates
  companyName: "KinderSupply",
};

// Load EmailJS SDK
if (typeof document !== "undefined" && EMAILJS_CONFIG.enabled && !document.getElementById("emailjs-sdk")) {
  const s = document.createElement("script");
  s.id = "emailjs-sdk";
  s.src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
  s.onload = () => { if (window.emailjs) window.emailjs.init(EMAILJS_CONFIG.publicKey); };
  document.head.appendChild(s);
}

// Send email notification
async function sendNotification({ toEmail, toName, orderId, subject, message }) {
  if (!EMAILJS_CONFIG.enabled || !window.emailjs || !toEmail) return;
  try {
    await window.emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
      to_email: toEmail,
      to_name: toName || "Valued Customer",
      order_id: orderId,
      subject: subject,
      message: message,
      company_name: EMAILJS_CONFIG.companyName,
    });
    console.log("Email sent to", toEmail);
    return true;
  } catch (err) {
    console.error("Email failed:", err);
    return false;
  }
}

// ─── Storage helpers ───
async function loadData(key, fallback) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : fallback; } catch(e) { return fallback; }
}
async function saveData(key, data) {
  try { await window.storage.set(key, JSON.stringify(data)); return true; } catch (e) { console.error("Save:", e); return false; }
}

// ─── Image resizer ───
function resizeImage(file, maxW = 400, maxH = 400, quality = 0.7) {
  return new Promise((resolve, reject) => {
    if (file.size > 2 * 1024 * 1024) { reject("too_large"); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxW) { h = (h * maxW) / w; w = maxW; }
        if (h > maxH) { w = (w * maxH) / h; h = maxH; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        if (dataUrl.length > 500 * 1024) {
          const smaller = canvas.toDataURL("image/jpeg", 0.4);
          resolve(smaller);
        } else {
          resolve(dataUrl);
        }
      };
      img.onerror = () => reject("invalid");
      img.src = e.target.result;
    };
    reader.onerror = () => reject("read_error");
    reader.readAsDataURL(file);
  });
}

      if (!file || !file.type.startsWith("image/")) return;
      setUploading(true);
      try {
        const dataUrl = await resizeImage(file, 400, 400, 0.7);

          <div style={S.inputGroup}><label style={S.label}>{t.supplierPassword}</label><input style={S.input} value={form.password} onChange={(e) => setForm({ ...form, password: e.target.value })} /></div>
          <div style={S.inputGroup}><label style={S.label}>{t.schoolName}</label><input style={S.input} value={form.schoolName || form.company} onChange={(e) => setForm({ ...form, schoolName: e.target.value, company: e.target.value })} /></div>
          <div style={S.inputGroup}><label style={S.label}>{t.email}</label><input style={S.input} value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} /></div>
          <div style={S.inputGroup}><label style={S.label}>{t.contactNumber}</label><input style={S.input} value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} /></div>
          <div style={S.inputGroup}><label style={S.label}>{t.address}</label><input style={S.input} value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} /></div>
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
          <button onClick={() => onSave(form)} style={{ ...S.primaryBtn, flex: 1 }}>{t.saveProduct}</button>
          <button onClick={onCancel} style={{ ...S.primaryBtn, flex: 1, background: "#ccc", color: "#333" }}>{t.cancelEdit}</button>
        </div>
      </div>
    );

  // ─── Section Editor ───
  const SectionEditor = ({ section, onSave, onCancel }) => {

      setF({ ...f, subs: [...f.subs, { id: autoId(newSub.nameEn), nameEn: newSub.nameEn, nameZh: newSub.nameZh || newSub.nameEn }] });

  // ─── Order Detail View (with admin management) ───
  const OrderDetailView = ({ order, isAdmin, t, lang, STATUSES, statusColor, pName, getClientInfo, updateOrderStatus, updateOrderAdminFields, showToast, onBack }) => {
    const [adminPo, setAdminPo] = useState(order.adminPo || "");
    const [invoiceNo, setInvoiceNo] = useState(order.invoiceNo || "");
    const [adminNotes, setAdminNotes] = useState(order.adminNotes || "");
    const [deliveryDate, setDeliveryDate] = useState(order.deliveryDate || "");
    const [clientPo, setClientPo] = useState(order.po || "");
    const [invoiceFile, setInvoiceFile] = useState(order.invoiceFile || "");
    const [invoiceFileName, setInvoiceFileName] = useState(order.invoiceFileName || "");
    const invoiceRef = useRef(null);
    // Payment state
    const [paymentDueDate, setPaymentDueDate] = useState(order.paymentDueDate || "");
    const [payments, setPayments] = useState(order.payments || []);
    const [returns, setReturns] = useState(order.returns || []);
    const [showPayForm, setShowPayForm] = useState(false);
    const [showReturnForm, setShowReturnForm] = useState(false);
    const [payForm, setPayForm] = useState({ amount: "", date: new Date().toISOString().slice(0, 10), method: "bank", ref: "" });
    const [returnForm, setReturnForm] = useState({ amount: "", date: new Date().toISOString().slice(0, 10), reason: "", items: "" });
    const [paymentProofs, setPaymentProofs] = useState(order.paymentProofs || []);
    const [showProofForm, setShowProofForm] = useState(false);
    const [proofNote, setProofNote] = useState("");
    const proofInputRef = useRef(null);

    const totalPaid = payments.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
    const totalReturns = returns.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
    const adjustedTotal = order.total - totalReturns;
    const outstanding = Math.max(0, adjustedTotal - totalPaid);
    const paymentStatus = outstanding <= 0 && totalPaid > 0 ? "paid" : totalPaid > 0 ? "partial" : totalReturns >= order.total ? "refunded" : (paymentDueDate && new Date(paymentDueDate) < new Date()) ? "overdue" : "unpaid";
    const payStatusColor = { unpaid: "#f59e0b", partial: "#3b82f6", paid: "#10b981", overdue: "#e74c3c", refunded: "#8b5cf6" };

    const addPayment = () => {
      if (!payForm.amount || parseFloat(payForm.amount) <= 0) return;
      const updated = [...payments, { ...payForm, id: Date.now() }];
      setPayments(updated);
      setPayForm({ amount: "", date: new Date().toISOString().slice(0, 10), method: "bank", ref: "" });
      setShowPayForm(false);
    };
    const removePayment = (id) => setPayments(payments.filter((p) => p.id !== id));

    const addReturn = () => {
      if (!returnForm.amount || parseFloat(returnForm.amount) <= 0) return;
      const updated = [...returns, { ...returnForm, id: Date.now() }];
      setReturns(updated);
      setReturnForm({ amount: "", date: new Date().toISOString().slice(0, 10), reason: "", items: "" });
      setShowReturnForm(false);
    };
    const removeReturn = (id) => setReturns(returns.filter((r) => r.id !== id));

    const handleProofUpload = async (file) => {
      if (!file || !file.type.startsWith("image/")) return;
      if (file.size > 1024 * 1024) { showToast(t.photoTooLarge); return; }
      try {
        const dataUrl = await resizeImage(file, 800, 800, 0.7);
        const newProof = { id: Date.now(), file: dataUrl, fileName: file.name, date: new Date().toISOString().slice(0, 10), note: proofNote, uploadedBy: order.supplier };
        const updated = [...paymentProofs, newProof];
        setPaymentProofs(updated);
        setProofNote("");
        setShowProofForm(false);
        // Save immediately (client-side save)
        updateOrderAdminFields(order.id, { paymentProofs: updated });
        showToast(t.proofUploaded);
      } catch(e) { showToast(t.photoTooLarge); }
    };
    const removeProof = (id) => {
      const updated = paymentProofs.filter((p) => p.id !== id);
      setPaymentProofs(updated);
    };

    const handleInvoiceUpload = (file) => {
      if (!file) return;
      if (file.size > 1024 * 1024) { showToast(t.photoTooLarge); return; }
      const reader = new FileReader();
      reader.onload = (e) => { setInvoiceFile(e.target.result); setInvoiceFileName(file.name); };
      reader.readAsDataURL(file);
    };

    const saveAdminFields = async () => {
      const ci = getClientInfo(order.supplier);
      const toEmail = ci?.email;
      const toName = ci?.schoolName || ci?.company || ci?.username || "";
      const notifications = [];

      if (adminPo && adminPo !== (order.adminPo || "")) {
        notifications.push({ subject: `${t.emailSubjectPo} — ${order.id}`, message: `${t.emailMsgPo} ${adminPo}` });
      }
      if (invoiceNo && invoiceNo !== (order.invoiceNo || "")) {
        notifications.push({ subject: `${t.emailSubjectInvoice} — ${order.id}`, message: `${t.emailMsgInvoice} ${invoiceNo}` });
      }
      if (invoiceFile && invoiceFile !== (order.invoiceFile || "")) {
        notifications.push({ subject: `${t.emailSubjectInvoiceUpload} — ${order.id}`, message: t.emailMsgInvoiceUpload });
      }
      if (paymentDueDate && paymentDueDate !== (order.paymentDueDate || "")) {
        notifications.push({ subject: `${t.emailSubjectPayment} — ${order.id}`, message: `${t.emailMsgPayment} ${paymentDueDate}` });
      }

      updateOrderAdminFields(order.id, {
        adminPo, invoiceNo, adminNotes, deliveryDate, po: clientPo, invoiceFile, invoiceFileName,
        paymentDueDate, payments, returns, paymentStatus, paymentProofs,
      });

      if (toEmail && notifications.length > 0) {
        let sent = 0;
        for (const n of notifications) {
          const ok = await sendNotification({ toEmail, toName, orderId: order.id, subject: n.subject, message: n.message });
          if (ok) sent++;
        }
        if (sent > 0) showToast(`${t.emailSent} (${sent})`);
      }
    };

    const curIdx = STATUSES.indexOf(order.status);
    const ci = isAdmin && order.supplier ? getClientInfo(order.supplier) : {};

    return (
      <div>
        <button onClick={onBack} style={S.backBtn}>{t.backToOrders}</button>

        {/* Status Progress Bar */}
        <div style={{ background: K.card, borderRadius: K.radius, border: `1.5px solid ${K.border}`, padding: "20px 24px", marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
            <h3 style={{ fontSize: 20, fontWeight: 900, color: K.text, margin: 0 }}>{t.orderDetails}</h3>
            {isAdmin && (
              <select style={{ ...S.input, width: "auto", padding: "6px 12px", fontSize: 13 }} value={order.status} onChange={(e) => updateOrderStatus(order.id, e.target.value)}>
                {STATUSES.map((s) => <option key={s} value={s}>{t.statusMap[s]}</option>)}
              </select>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 0, overflow: "auto", paddingBottom: 4 }}>
            {STATUSES.map((s, i) => {
              const isActive = i <= curIdx;
              const isCurrent = s === order.status;
              return (
                <div key={s} style={{ display: "flex", alignItems: "center", flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: 60 }}>
                    <div style={{
                      width: 28, height: 28, borderRadius: "50%",
                      background: isActive ? statusColor(order.status) : "#e5e7eb",
                      color: isActive ? "#fff" : "#9ca3af",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 13, fontWeight: 800, fontFamily: K.font,
                      border: isCurrent ? `3px solid ${statusColor(order.status)}44` : "none",
                      boxShadow: isCurrent ? `0 0 0 4px ${statusColor(order.status)}22` : "none",
                    }}>
                      {isActive ? "✓" : i + 1}
                    </div>
                    <span style={{ fontSize: 10, fontWeight: 700, color: isActive ? statusColor(order.status) : "#9ca3af", marginTop: 4, textAlign: "center", whiteSpace: "nowrap" }}>{t.statusMap[s]}</span>
                  </div>
                  {i < STATUSES.length - 1 && (
                    <div style={{ flex: 1, height: 3, background: i < curIdx ? statusColor(order.status) : "#e5e7eb", margin: "0 4px", borderRadius: 2, minWidth: 16, marginBottom: 18 }} />
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: isAdmin ? "1fr 360px" : "1fr", gap: 16, alignItems: "start" }}>
          {/* Left: Order info */}
          <div>
            {/* Order meta */}
            <div style={{ ...S.orderDetailCard, marginBottom: 16 }}>
              <div style={S.orderMeta}>
                <div style={S.metaItem}><span style={S.metaLabel}>{t.orderNumber}</span><span style={S.metaValue}>{order.id}</span></div>
                <div style={S.metaItem}><span style={S.metaLabel}>{t.date}</span><span style={S.metaValue}>{order.date}</span></div>
                {order.deliveryDate && <div style={S.metaItem}><span style={S.metaLabel}>{t.deliveryDate}</span><span style={S.metaValue}>{order.deliveryDate}</span></div>}
                {order.po && <div style={S.metaItem}><span style={S.metaLabel}>{t.poNumber}</span><span style={S.metaValue}>{order.po}</span></div>}
                {order.adminPo && !isAdmin && <div style={S.metaItem}><span style={S.metaLabel}>{t.adminPo}</span><span style={S.metaValue}>{order.adminPo}</span></div>}
                {order.invoiceNo && !isAdmin && <div style={S.metaItem}><span style={S.metaLabel}>{t.invoiceNo}</span><span style={S.metaValue}>{order.invoiceNo}</span></div>}
                {isAdmin && order.company && <div style={S.metaItem}><span style={S.metaLabel}>Company</span><span style={S.metaValue}>{order.company}</span></div>}
              </div>
              {/* Client invoice download for supplier */}
              {!isAdmin && order.invoiceFile && (
                <div style={{ marginTop: 12, padding: 12, background: "#EBF5FF", borderRadius: 10, border: "1.5px solid #C8DEFF", display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 22 }}>📄</span>
                  <div style={{ flex: 1 }}>
                    <span style={{ fontWeight: 700, fontSize: 13, color: K.text, display: "block" }}>{t.invoiceNo}: {order.invoiceNo || "—"}</span>
                    <span style={{ fontSize: 12, color: K.textLight }}>{order.invoiceFileName || "Invoice"}</span>
                  </div>
                  <a href={order.invoiceFile} download={order.invoiceFileName || "invoice"} style={{ background: "#3b82f6", color: "#fff", border: "none", borderRadius: 8, padding: "6px 14px", fontSize: 12, fontWeight: 700, fontFamily: K.font, textDecoration: "none", cursor: "pointer" }}>{t.viewInvoice}</a>
                </div>
              )}
            </div>

            {/* Client details for admin */}
            {isAdmin && ci.username && (
              <div style={{ marginBottom: 16, padding: 16, background: "#EBF5FF", borderRadius: 12, border: "1.5px solid #C8DEFF" }}>
                <h4 style={{ margin: "0 0 10px", fontSize: 14, fontWeight: 800, color: "#2563eb" }}>👤 {t.clientDetails}</h4>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 20px", fontSize: 13 }}>
                  <div><span style={{ fontWeight: 700, color: K.textLight }}>🏫 </span><span style={{ color: K.text }}>{ci.schoolName || ci.company || ci.username}</span></div>
                  {ci.email && <div><span style={{ fontWeight: 700, color: K.textLight }}>📧 </span><span style={{ color: K.text }}>{ci.email}</span></div>}
                  {ci.phone && <div><span style={{ fontWeight: 700, color: K.textLight }}>📞 </span><span style={{ color: K.text }}>{ci.phone}</span></div>}
                  {ci.address && <div style={{ gridColumn: "1/-1" }}><span style={{ fontWeight: 700, color: K.textLight }}>📍 </span><span style={{ color: K.text }}>{ci.address}</span></div>}
                </div>
              </div>
            )}

            {/* Items */}
            <div style={S.orderDetailCard}>
              <div style={S.orderItemsList}>
                {order.items.map((item, idx) => (
                  <div key={idx} style={S.orderItemRow}>
                    <span style={{ fontSize: 28, minWidth: 36 }}>{item.img}</span>
                    <div style={{ flex: 1 }}><span style={S.cartItemName}>{pName(item)}</span><span style={S.cartItemPrice}>RM {item.price.toFixed(2)} × {item.qty}</span></div>
                    <span style={S.cartItemTotal}>RM {(item.qty * item.price).toFixed(2)}</span>
                  </div>
                ))}
              </div>
              <div style={{ ...S.totalRow, borderTop: "2px solid #eee", marginTop: 16, paddingTop: 16 }}><span style={S.totalLabel}>{t.total}</span><span style={S.totalAmount}>RM {order.total.toFixed(2)}</span></div>
              {order.notes && <div style={{ marginTop: 12, padding: 10, background: K.bg, borderRadius: 8, fontSize: 13, color: K.textLight }}><strong>{t.orderNotes}:</strong> {order.notes}</div>}
            </div>
          </div>

          {/* Right: Admin management panel */}
          {isAdmin && (
            <div style={{ background: K.card, borderRadius: K.radius, border: `1.5px solid ${K.border}`, padding: 22, position: "sticky", top: 100 }}>
              <h3 style={{ fontSize: 16, fontWeight: 900, margin: "0 0 18px", color: K.text }}>📋 {t.adminOrderInfo}</h3>

              <div style={S.inputGroup}>
                <label style={S.label}>{t.deliveryDate}</label>
                <input type="date" style={S.input} value={deliveryDate} onChange={(e) => setDeliveryDate(e.target.value)} />
              </div>

              <div style={S.inputGroup}>
                <label style={S.label}>{t.poNumber} (Client)</label>
                <input style={S.input} value={clientPo} onChange={(e) => setClientPo(e.target.value)} placeholder="Client PO number" />
              </div>

              <div style={S.inputGroup}>
                <label style={S.label}>{t.adminPo}</label>
                <input style={S.input} value={adminPo} onChange={(e) => setAdminPo(e.target.value)} placeholder="PO-2026-001" />
              </div>

              <div style={S.inputGroup}>
                <label style={S.label}>{t.invoiceNo}</label>
                <input style={S.input} value={invoiceNo} onChange={(e) => setInvoiceNo(e.target.value)} placeholder="INV-2026-001" />
              </div>

              <div style={S.inputGroup}>
                <label style={S.label}>{t.uploadInvoice}</label>
                {invoiceFile ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8, padding: 10, background: K.bg, borderRadius: 10, border: `1.5px solid ${K.border}` }}>
                    <span style={{ fontSize: 24 }}>{invoiceFileName?.endsWith(".pdf") ? "📄" : "🖼️"}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: K.text, display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{invoiceFileName || "Invoice"}</span>
                    </div>
                    <a href={invoiceFile} download={invoiceFileName} style={{ fontSize: 11, fontWeight: 700, color: "#3b82f6", textDecoration: "none" }}>⬇</a>
                    <button onClick={() => { setInvoiceFile(""); setInvoiceFileName(""); }} style={{ background: "none", border: "none", color: "#e74c3c", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: K.font }}>{t.removeInvoice}</button>
                  </div>
                ) : (
                  <div
                    onClick={() => invoiceRef.current?.click()}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={(e) => { e.preventDefault(); handleInvoiceUpload(e.dataTransfer.files[0]); }}
                    style={{ padding: "18px 12px", border: `2px dashed ${K.border}`, borderRadius: 10, textAlign: "center", cursor: "pointer", background: K.bg, transition: "border-color 0.2s" }}
                  >
                    <div style={{ fontSize: 24, marginBottom: 4 }}>📎</div>
                    <span style={{ fontSize: 12, color: K.textLight, fontFamily: K.font }}>{t.dragDrop}</span>
                    <div style={{ fontSize: 10, color: K.textLight, marginTop: 4 }}>{t.invoiceHint}</div>
                    <input ref={invoiceRef} type="file" accept="image/*,.pdf" style={{ display: "none" }} onChange={(e) => handleInvoiceUpload(e.target.files[0])} />
                  </div>
                )}
              </div>

              <div style={S.inputGroup}>
                <label style={S.label}>{t.orderNotes}</label>
                <textarea style={{ ...S.input, minHeight: 60, resize: "vertical" }} value={adminNotes} onChange={(e) => setAdminNotes(e.target.value)} placeholder="Internal notes..." />
              </div>

              <button onClick={saveAdminFields} style={S.primaryBtn}>{t.saveOrderInfo}</button>
              <div style={{ marginTop: 12, padding: 10, borderRadius: 8, fontSize: 11, fontWeight: 700, fontFamily: K.font, display: "flex", alignItems: "center", gap: 6, background: EMAILJS_CONFIG.enabled ? "#DCFCE7" : K.bg, color: EMAILJS_CONFIG.enabled ? "#166534" : K.textLight, border: `1px solid ${EMAILJS_CONFIG.enabled ? "#BBF7D0" : K.border}` }}>
                <span>{EMAILJS_CONFIG.enabled ? "✅" : "📧"}</span>
                <span>{EMAILJS_CONFIG.enabled ? `${t.emailSent.replace("!", "")} → ${(() => { const ci = getClientInfo(order.supplier); return ci?.email || "—"; })()}` : t.emailNotConfigured}</span>
              </div>
            </div>
          )}
        </div>

        {/* ─── Payment Summary (visible to both admin and supplier) ─── */}
        <div style={{ background: K.card, borderRadius: K.radius, border: `1.5px solid ${K.border}`, padding: 22, marginTop: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
            <h3 style={{ fontSize: 16, fontWeight: 900, margin: 0, color: K.text }}>💰 {t.paymentManagement}</h3>
            <span style={{ fontSize: 13, fontWeight: 800, borderRadius: 8, padding: "4px 12px", background: (payStatusColor[paymentStatus] || "#9ca3af") + "22", color: payStatusColor[paymentStatus] || "#9ca3af" }}>{t.paymentStatusMap[paymentStatus]}</span>
          </div>

          {/* Financial summary */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 16 }}>
            <div style={{ padding: 14, background: K.bg, borderRadius: 10, textAlign: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: K.textLight, marginBottom: 4 }}>{t.originalAmount}</div>
              <div style={{ fontSize: 18, fontWeight: 900, color: K.text }}>RM {order.total.toFixed(2)}</div>
            </div>
            <div style={{ padding: 14, background: totalReturns > 0 ? "#FEF3C7" : K.bg, borderRadius: 10, textAlign: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: K.textLight, marginBottom: 4 }}>{t.totalReturns}</div>
              <div style={{ fontSize: 18, fontWeight: 900, color: totalReturns > 0 ? "#92400E" : K.textLight }}>- RM {totalReturns.toFixed(2)}</div>
            </div>
            <div style={{ padding: 14, background: totalPaid > 0 ? "#DCFCE7" : K.bg, borderRadius: 10, textAlign: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: K.textLight, marginBottom: 4 }}>{t.totalPaid}</div>
              <div style={{ fontSize: 18, fontWeight: 900, color: totalPaid > 0 ? "#166534" : K.textLight }}>RM {totalPaid.toFixed(2)}</div>
            </div>
            <div style={{ padding: 14, background: outstanding > 0 ? "#FEE2E2" : "#DCFCE7", borderRadius: 10, textAlign: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: K.textLight, marginBottom: 4 }}>{t.balance}</div>
              <div style={{ fontSize: 18, fontWeight: 900, color: outstanding > 0 ? "#991B1B" : "#166534" }}>RM {outstanding.toFixed(2)}</div>
            </div>
          </div>

          {paymentDueDate && (
            <div style={{ padding: 10, background: new Date(paymentDueDate) < new Date() ? "#FEE2E2" : "#EBF5FF", borderRadius: 8, fontSize: 13, fontWeight: 700, color: new Date(paymentDueDate) < new Date() ? "#991B1B" : "#1E40AF", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
              <span>{new Date(paymentDueDate) < new Date() ? "⚠️" : "📅"}</span>
              {t.paymentDueDate}: {paymentDueDate}
            </div>
          )}

          {isAdmin && (
            <div style={S.inputGroup}>
              <label style={S.label}>{t.paymentDueDate}</label>
              <input type="date" style={S.input} value={paymentDueDate} onChange={(e) => setPaymentDueDate(e.target.value)} />
            </div>
          )}

          {/* Payment history */}
          <div style={{ marginTop: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <h4 style={{ fontSize: 14, fontWeight: 800, margin: 0, color: K.text }}>{t.paymentHistory}</h4>
              {isAdmin && <button onClick={() => setShowPayForm(!showPayForm)} style={{ ...S.adminActionBtn, color: "#10b981", borderColor: "#BBF7D0" }}>{t.addPayment}</button>}
            </div>
            {isAdmin && showPayForm && (
              <div style={{ padding: 14, background: K.bg, borderRadius: 10, marginBottom: 10, border: `1.5px solid ${K.border}` }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 12px" }}>
                  <div style={S.inputGroup}><label style={S.label}>{t.paymentAmount}</label><input type="number" step="0.01" style={S.input} value={payForm.amount} onChange={(e) => setPayForm({ ...payForm, amount: e.target.value })} /></div>
                  <div style={S.inputGroup}><label style={S.label}>{t.paymentDate}</label><input type="date" style={S.input} value={payForm.date} onChange={(e) => setPayForm({ ...payForm, date: e.target.value })} /></div>
                  <div style={S.inputGroup}><label style={S.label}>{t.paymentMethod}</label><select style={S.input} value={payForm.method} onChange={(e) => setPayForm({ ...payForm, method: e.target.value })}>{Object.entries(t.paymentMethods).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</select></div>
                  <div style={S.inputGroup}><label style={S.label}>{t.paymentRef}</label><input style={S.input} value={payForm.ref} onChange={(e) => setPayForm({ ...payForm, ref: e.target.value })} /></div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={addPayment} style={{ ...S.primaryBtn, flex: 1, padding: "8px 0", fontSize: 13, background: "#10b981" }}>{t.savePayment}</button>
                  <button onClick={() => setShowPayForm(false)} style={{ ...S.primaryBtn, flex: 1, padding: "8px 0", fontSize: 13, background: "#ccc", color: "#333" }}>{t.cancelPayment}</button>
                </div>
              </div>
            )}
            {payments.length === 0 ? (
              <p style={{ fontSize: 13, color: K.textLight, padding: "8px 0" }}>{t.noPayments}</p>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {payments.map((p) => (
                  <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "#DCFCE7", borderRadius: 8, fontSize: 13 }}>
                    <span style={{ fontWeight: 800, color: "#166534" }}>+ RM {parseFloat(p.amount).toFixed(2)}</span>
                    <span style={{ color: "#166534" }}>{p.date}</span>
                    <span style={{ color: "#15803D", fontSize: 12 }}>{t.paymentMethods[p.method] || p.method}</span>
                    {p.ref && <span style={{ color: "#166534", fontSize: 11 }}>#{p.ref}</span>}
                    {isAdmin && <button onClick={() => removePayment(p.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: "#e74c3c", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: K.font }}>{t.deletePayment}</button>}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Return history */}
          <div style={{ marginTop: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <h4 style={{ fontSize: 14, fontWeight: 800, margin: 0, color: K.text }}>{t.returnHistory}</h4>
              {isAdmin && <button onClick={() => setShowReturnForm(!showReturnForm)} style={{ ...S.adminActionBtn, color: "#f59e0b", borderColor: "#FDE68A" }}>{t.addReturn}</button>}
            </div>
            {isAdmin && showReturnForm && (
              <div style={{ padding: 14, background: K.bg, borderRadius: 10, marginBottom: 10, border: `1.5px solid ${K.border}` }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 12px" }}>
                  <div style={S.inputGroup}><label style={S.label}>{t.returnAmount}</label><input type="number" step="0.01" style={S.input} value={returnForm.amount} onChange={(e) => setReturnForm({ ...returnForm, amount: e.target.value })} /></div>
                  <div style={S.inputGroup}><label style={S.label}>{t.returnDate}</label><input type="date" style={S.input} value={returnForm.date} onChange={(e) => setReturnForm({ ...returnForm, date: e.target.value })} /></div>
                  <div style={{ ...S.inputGroup, gridColumn: "1/-1" }}><label style={S.label}>{t.returnItems}</label><input style={S.input} value={returnForm.items} onChange={(e) => setReturnForm({ ...returnForm, items: e.target.value })} placeholder={lang === "zh" ? "例如：5套闪卡、2套积木" : "e.g. 5x Flash Cards, 2x Building Blocks"} /></div>
                  <div style={{ ...S.inputGroup, gridColumn: "1/-1" }}><label style={S.label}>{t.returnReason}</label><input style={S.input} value={returnForm.reason} onChange={(e) => setReturnForm({ ...returnForm, reason: e.target.value })} /></div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={addReturn} style={{ ...S.primaryBtn, flex: 1, padding: "8px 0", fontSize: 13, background: "#f59e0b" }}>{t.savePayment}</button>
                  <button onClick={() => setShowReturnForm(false)} style={{ ...S.primaryBtn, flex: 1, padding: "8px 0", fontSize: 13, background: "#ccc", color: "#333" }}>{t.cancelPayment}</button>
                </div>
              </div>
            )}
            {returns.length === 0 ? (
              <p style={{ fontSize: 13, color: K.textLight, padding: "8px 0" }}>{t.noReturns}</p>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {returns.map((r) => (
                  <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "#FEF3C7", borderRadius: 8, fontSize: 13, flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 800, color: "#92400E" }}>- RM {parseFloat(r.amount).toFixed(2)}</span>
                    <span style={{ color: "#92400E" }}>{r.date}</span>
                    {r.items && <span style={{ color: "#92400E", fontSize: 12 }}>{r.items}</span>}
                    {r.reason && <span style={{ color: "#B45309", fontSize: 11 }}>({r.reason})</span>}
                    {isAdmin && <button onClick={() => removeReturn(r.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: "#e74c3c", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: K.font }}>{t.deletePayment}</button>}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Proof of Payment */}
          <div style={{ marginTop: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <h4 style={{ fontSize: 14, fontWeight: 800, margin: 0, color: K.text }}>🧾 {t.proofOfPayment}</h4>
              {!isAdmin && <button onClick={() => setShowProofForm(!showProofForm)} style={{ ...S.adminActionBtn, color: "#3b82f6", borderColor: "#BFDBFE" }}>{t.uploadProof}</button>}
            </div>

            {/* Upload form (client only) */}
            {!isAdmin && showProofForm && (
              <div style={{ padding: 14, background: K.bg, borderRadius: 10, marginBottom: 10, border: `1.5px solid ${K.border}` }}>
                <div style={S.inputGroup}>
                  <label style={S.label}>{t.addProofNote}</label>
                  <input style={S.input} value={proofNote} onChange={(e) => setProofNote(e.target.value)} placeholder={lang === "zh" ? "例如：3月18日银行转账" : "e.g. Bank transfer on 18 Mar"} />
                </div>
                <div
                  onClick={() => proofInputRef.current?.click()}
                  onDragOver={(e) => e.preventDefault()}
                  onDrop={(e) => { e.preventDefault(); handleProofUpload(e.dataTransfer.files[0]); }}
                  style={{ padding: "20px 12px", border: `2px dashed ${K.border}`, borderRadius: 10, textAlign: "center", cursor: "pointer", background: K.card, transition: "border-color 0.2s" }}
                >
                  <div style={{ fontSize: 28, marginBottom: 6 }}>📸</div>
                  <span style={{ fontSize: 13, fontWeight: 700, color: K.primary, fontFamily: K.font }}>{t.uploadProof}</span>
                  <div style={{ fontSize: 11, color: K.textLight, marginTop: 4 }}>{t.proofHint}</div>
                  <input ref={proofInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { handleProofUpload(e.target.files[0]); e.target.value = ""; }} />
                </div>
                <button onClick={() => setShowProofForm(false)} style={{ ...S.primaryBtn, marginTop: 8, background: "#ccc", color: "#333", padding: "8px 0", fontSize: 13 }}>{t.cancelPayment}</button>
              </div>
            )}

            {/* Proof list */}
            {paymentProofs.length === 0 ? (
              <p style={{ fontSize: 13, color: K.textLight, padding: "8px 0" }}>{t.noProofs}</p>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {paymentProofs.map((proof) => (
                  <div key={proof.id} style={{ background: "#EBF5FF", borderRadius: 10, border: "1.5px solid #C8DEFF", overflow: "hidden" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px" }}>
                      <span style={{ fontSize: 20 }}>🧾</span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <span style={{ fontWeight: 700, fontSize: 13, color: "#1E40AF", display: "block" }}>{proof.fileName || "Payment proof"}</span>
                        <span style={{ fontSize: 11, color: "#3B82F6" }}>{t.proofDate}: {proof.date}{proof.note ? ` — ${proof.note}` : ""}</span>
                      </div>
                      <a href={proof.file} download={proof.fileName || "proof"} style={{ fontSize: 11, fontWeight: 700, color: "#3b82f6", textDecoration: "none", padding: "4px 8px", border: "1.5px solid #BFDBFE", borderRadius: 6, background: "#fff" }}>{t.downloadProof}</a>
                      {(isAdmin || proof.uploadedBy === order.supplier) && (
                        <button onClick={() => removeProof(proof.id)} style={{ background: "none", border: "none", color: "#e74c3c", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: K.font }}>{t.removeProof}</button>
                      )}
                    </div>
                    {proof.file && (
                      <div style={{ padding: "0 14px 10px", cursor: "pointer" }} onClick={() => window.open(proof.file, "_blank")}>
                        <img src={proof.file} alt="" style={{ width: "100%", maxHeight: 200, objectFit: "contain", borderRadius: 6, background: "#fff" }} />
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>

          {isAdmin && <button onClick={saveAdminFields} style={{ ...S.primaryBtn, marginTop: 16 }}>{t.saveOrderInfo}</button>}
        </div>
      </div>
    );
  };

  return (
    <div style={S.app}>
      {toast && <div style={S.toast}>{toast}</div>}

      {/* Header */}
      <header style={S.header}>
        <div style={S.headerLeft}>
          <span style={S.logo}>🏫</span>
          <div>
            <h1 style={S.brandName}>{t.title}</h1>
            <span style={S.brandSub}>{t.subtitle}{isAdmin ? " (Admin)" : ""}</span>
          </div>
        </div>
        <div style={S.headerRight}>
          <span style={S.welcomeText}>{t.welcome}, {user.company || user.schoolName || user.username}</span>
          <LangSelect />
          <button onClick={() => { setUser(null); setCart([]); setLoginForm({ username: "", password: "" }); setPage("catalog"); setAuthMode("login"); }} style={S.logoutBtn}>{t.logout}</button>
        </div>
      </header>

      {/* Nav */}
      <nav style={S.nav}>
        {["catalog", "cart", "orders", ...(!isAdmin ? ["profile"] : []), ...(isAdmin ? ["admin"] : [])].map((p) => (
          <button key={p} onClick={() => { setPage(p); setViewingOrder(null); }} style={{ ...S.navBtn, ...(page === p ? S.navBtnActive : {}) }}>
            {{ catalog: "📦 ", cart: "🛒 ", orders: "📋 ", profile: "👤 ", admin: "⚙️ " }[p]}
            {t[p]}
            {p === "cart" && cartCount > 0 && <span style={S.badge}>{cartCount}</span>}
          </button>
        ))}
      </nav>

      {/* ─── Catalog ─── */}
      {page === "catalog" && (
        <div style={S.content}>
          <div style={S.toolbar}><input style={S.searchInput} placeholder={t.search} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} /></div>
          <div style={S.categoryBar}>
            <button onClick={() => { setSelectedCategory("all"); setSelectedSubCategory("all"); }} style={{ ...S.catBtn, ...(selectedCategory === "all" ? S.catBtnActive : {}) }}>{t.allCategories}</button>
            {sections.map((sec) => (
              <button key={sec.id} onClick={() => { setSelectedCategory(sec.id); setSelectedSubCategory("all"); }} style={{ ...S.catBtn, ...(selectedCategory === sec.id ? S.catBtnActive : {}) }}>{sec.emoji} {lang === "zh" ? sec.nameZh : sec.nameEn}</button>
            ))}
          </div>
          {selectedCategory !== "all" && getSubSections(selectedCategory).length > 0 && (
            <div style={{ ...S.categoryBar, marginTop: -12 }}>
              <button onClick={() => setSelectedSubCategory("all")} style={{ ...S.catBtn, fontSize: 12, padding: "4px 12px", ...(selectedSubCategory === "all" ? { background: K.secondary, borderColor: K.secondary, color: "#fff" } : {}) }}>{t.allSubCategories}</button>
              {getSubSections(selectedCategory).map((sub) => (
                <button key={sub.id} onClick={() => setSelectedSubCategory(sub.id)} style={{ ...S.catBtn, fontSize: 12, padding: "4px 12px", ...(selectedSubCategory === sub.id ? { background: K.secondary, borderColor: K.secondary, color: "#fff" } : {}) }}>{lang === "zh" ? sub.nameZh : sub.nameEn}</button>
              ))}
            </div>
          )}
          <div style={S.productGrid}>
            {filteredProducts.map((p) => (
              <div key={p.id} style={S.productCard}>
                <div style={S.productImgWrap}>
                  {p.photo ? <img src={p.photo} alt="" style={S.productPhoto} /> : <span style={{ fontSize: 48 }}>{p.img}</span>}
                </div>
                <div style={S.productInfo}>
                  <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", marginBottom: 4 }}>
                    <span style={S.sku}>{p.sku}</span>
                    {p.subCat && <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 6px", background: K.bg, borderRadius: 4, color: K.textLight, border: `1px solid ${K.border}` }}>{getSubName(p.cat, p.subCat)}</span>}
                  </div>
                  <h3 style={S.productName}>{pName(p)}</h3>
                  <div style={S.productMeta}>
                    <span style={S.price}>RM {p.price.toFixed(2)}<span style={S.perUnit}>{t.perUnit}</span></span>
                    <span style={S.minOrder}>{t.minQty}: {p.minQty}</span>
                  </div>
                  {!isAdmin && (
                    <button onClick={() => addToCart(p)} style={{ ...S.addBtn, ...(addedItems[p.id] ? S.addBtnDone : {}) }}>
                      {addedItems[p.id] ? t.added : t.addToCart}
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ─── Cart ─── */}
      {page === "cart" && (
        <div style={S.content}>
          {cart.length === 0 ? (
            <div style={S.emptyState}>
              <div style={{ fontSize: 64 }}>🛒</div>
              <h3 style={S.emptyTitle}>{t.emptyCart}</h3>
              <p style={S.emptyMsg}>{t.browseProducts}</p>
              <button onClick={() => setPage("catalog")} style={{ ...S.primaryBtn, width: "auto", padding: "12px 32px" }}>{t.catalog}</button>
            </div>
          ) : (
            <div style={S.cartLayout}>
              <div style={S.cartItems}>
                {cart.map((item) => (
                  <div key={item.id} style={S.cartRow}>
                    <div style={{ width: 44, height: 44, borderRadius: 8, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", background: K.bg, flexShrink: 0 }}>
                      {item.photo ? <img src={item.photo} alt="" style={{ width: 44, height: 44, objectFit: "cover" }} /> : <span style={{ fontSize: 26 }}>{item.img}</span>}
                    </div>
                    <div style={S.cartItemInfo}>
                      <h4 style={S.cartItemName}>{pName(item)}</h4>
                      <span style={S.cartItemPrice}>RM {item.price.toFixed(2)} {t.perUnit}</span>
                    </div>
                    <div style={S.qtyControl}>
                      <button onClick={() => updateQty(item.id, item.qty - 1)} style={S.qtyBtn}>−</button>
                      <input type="number" value={item.qty} onChange={(e) => updateQty(item.id, parseInt(e.target.value) || 1)} style={S.qtyInput} />
                      <button onClick={() => updateQty(item.id, item.qty + 1)} style={S.qtyBtn}>+</button>
                    </div>
                    <span style={S.cartItemTotal}>RM {(item.qty * item.price).toFixed(2)}</span>
                    <button onClick={() => removeFromCart(item.id)} style={S.removeBtn}>✕</button>
                  </div>
                ))}
              </div>
              <div style={S.checkoutPanel}>
                <h3 style={S.checkoutTitle}>{t.checkout}</h3>
                <div style={S.inputGroup}><label style={S.label}>{t.notes}</label><textarea style={{ ...S.input, minHeight: 70, resize: "vertical" }} value={checkoutForm.notes} onChange={(e) => setCheckoutForm((f) => ({ ...f, notes: e.target.value }))} placeholder={lang === "zh" ? "特殊要求..." : "Any special requests..."} /></div>
                <div style={S.totalRow}><span style={S.totalLabel}>{t.total}</span><span style={S.totalAmount}>RM {cartTotal.toFixed(2)}</span></div>
                <button onClick={placeOrder} style={S.primaryBtn}>{t.checkout}</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ─── Orders ─── */}
      {page === "orders" && (
        <div style={S.content}>
          {viewingOrder ? (
            <OrderDetailView
              order={viewingOrder}
              isAdmin={isAdmin}
              t={t}
              lang={lang}
              STATUSES={STATUSES}
              statusColor={statusColor}
              pName={pName}
              getClientInfo={getClientInfo}
              updateOrderStatus={updateOrderStatus}
              updateOrderAdminFields={updateOrderAdminFields}
              showToast={showToast}
              onBack={() => setViewingOrder(null)}
            />
          ) : myOrders.length === 0 ? (
            <div style={S.emptyState}><div style={{ fontSize: 64 }}>📋</div><h3 style={S.emptyTitle}>{t.noOrders}</h3><button onClick={() => setPage("catalog")} style={{ ...S.primaryBtn, width: "auto", padding: "12px 32px" }}>{t.catalog}</button></div>
          ) : (
            <div style={S.ordersList}>
              {myOrders.map((order) => (
                <div key={order.id} style={S.orderCard} onClick={() => setViewingOrder(order)}>
                  <div style={S.orderCardTop}><span style={S.orderId}>{order.id}</span><span style={{ ...S.statusBadge, background: statusColor(order.status) + "22", color: statusColor(order.status) }}>{t.statusMap[order.status]}</span></div>
                  <div style={S.orderCardBody}>
                    <div>
                      <span style={S.orderInfo}>{t.date}: {order.date}</span>
                      {isAdmin && order.company && <span style={S.orderInfo}>Company: {order.company}</span>}
                      <span style={S.orderInfo}>{t.items}: {order.items.reduce((s, i) => s + i.qty, 0)} {t.pieces}</span>
                    </div>
                    <span style={S.orderTotal}>RM {order.total.toFixed(2)}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ─── Profile ─── */}
      {page === "profile" && profileForm && (
        <div style={S.content}>
          <div style={{ maxWidth: 600 }}>
            <h2 style={{ fontSize: 22, fontWeight: 900, margin: "0 0 24px", color: K.text }}>👤 {t.profileTitle}</h2>
            <div style={S.profileCard}>
              <div style={S.editFormGrid}>
                <div style={{ ...S.inputGroup, gridColumn: "1/-1" }}><label style={S.label}>{t.schoolName}</label><input style={S.input} value={profileForm.schoolName} onChange={(e) => setProfileForm({ ...profileForm, schoolName: e.target.value, company: e.target.value })} /></div>
                <div style={{ ...S.inputGroup, gridColumn: "1/-1" }}><label style={S.label}>{t.address}</label><input style={S.input} value={profileForm.address} onChange={(e) => setProfileForm({ ...profileForm, address: e.target.value })} /></div>
                <div style={S.inputGroup}><label style={S.label}>{t.contactNumber}</label><input style={S.input} value={profileForm.phone} onChange={(e) => setProfileForm({ ...profileForm, phone: e.target.value })} /></div>
                <div style={S.inputGroup}><label style={S.label}>{t.email}</label><input style={S.input} type="email" value={profileForm.email} onChange={(e) => setProfileForm({ ...profileForm, email: e.target.value })} /></div>
              </div>
              <button onClick={saveProfile} style={{ ...S.primaryBtn, marginTop: 8 }}>{t.updateProfile}</button>
            </div>
            <div style={{ ...S.profileCard, marginTop: 20 }}>
              <h3 style={{ fontSize: 16, fontWeight: 800, margin: "0 0 16px", color: K.text }}>🔒 {t.changePassword}</h3>
              <div style={S.editFormGrid}>
                <div style={S.inputGroup}><label style={S.label}>{t.currentPassword}</label><input style={S.input} type="password" value={pwForm.current} onChange={(e) => setPwForm({ ...pwForm, current: e.target.value })} /></div>
                <div style={S.inputGroup}><label style={S.label}>{t.newPassword}</label><input style={S.input} type="password" value={pwForm.newPw} onChange={(e) => setPwForm({ ...pwForm, newPw: e.target.value })} /></div>
              </div>
              <button onClick={changePassword} disabled={!pwForm.current || !pwForm.newPw} style={{ ...S.primaryBtn, marginTop: 8, opacity: pwForm.current && pwForm.newPw ? 1 : 0.5 }}>{t.changePassword}</button>
            </div>
          </div>
        </div>
      )}

      {/* ─── Admin ─── */}
      {page === "admin" && isAdmin && (
        <div style={S.content}>
          <div style={S.adminHeader}>
            <h2 style={{ fontSize: 22, fontWeight: 900, margin: 0, color: K.text }}>⚙️ {t.adminTitle}</h2>
            <button onClick={resetAllData} style={{ ...S.logoutBtn, fontSize: 13 }}>{t.resetData}</button>
          </div>
          <div style={S.adminTabs}>
            {["products", "categories", "orders", "payments", "suppliers"].map((tab) => (
              <button key={tab} onClick={() => { setAdminTab(tab); setEditingProduct(null); setEditingSupplier(null); setEditingSec(null); if (tab === "orders") { setAdminOrderFilter("all"); setAdminOrderView("list"); } }} style={{ ...S.catBtn, ...(adminTab === tab ? S.catBtnActive : {}) }}>
                {{ products: t.manageProducts, categories: "📂 " + t.manageCategories, orders: t.manageOrders, payments: "💰 " + t.managePayments, suppliers: t.manageSuppliers }[tab]}
              </button>
            ))}
          </div>

          {adminTab === "products" && (
            <div>
              <button onClick={() => setEditingProduct({ nameEn: "", nameZh: "", price: 0, minQty: 1, img: "📦", sku: "", cat: sections[0]?.id || "books", subCat: "", photo: "" })} style={S.adminAddBtn}>{t.addProduct}</button>
              {editingProduct && <ProductForm product={editingProduct} onSave={saveProduct} onCancel={() => setEditingProduct(null)} />}
              <div style={S.adminTable}>
                {products.map((p) => (
                  <div key={p.id} style={S.adminRow}>
                    <div style={{ width: 44, height: 44, borderRadius: 8, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", background: K.bg, flexShrink: 0 }}>
                      {p.photo ? <img src={p.photo} alt="" style={{ width: 44, height: 44, objectFit: "cover" }} /> : <span style={{ fontSize: 24 }}>{p.img}</span>}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <span style={{ fontWeight: 700, fontSize: 14, display: "block" }}>{p.nameEn}</span>
                      <span style={{ color: K.textLight, fontSize: 12 }}>{p.nameZh} · {p.sku} · RM {p.price.toFixed(2)} · {getSectionEmoji(p.cat)} {getSectionName(p.cat)}{p.subCat ? ` / ${getSubName(p.cat, p.subCat)}` : ""}</span>
                    </div>
                    <button onClick={() => setEditingProduct(p)} style={S.adminActionBtn}>{t.editProduct}</button>
                    <button onClick={() => deleteProduct(p.id)} style={{ ...S.adminActionBtn, color: "#e74c3c", borderColor: "#ffcdd2" }}>{t.deleteProduct}</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ─── Categories Tab ─── */}
          {adminTab === "categories" && (
            <div>
              <button onClick={() => setEditingSec({ id: "", nameEn: "", nameZh: "", emoji: "📦", subs: [] })} style={S.adminAddBtn}>{t.addSection}</button>
              {editingSec && <SectionEditor section={editingSec} onSave={(s) => { saveSection(s); setEditingSec(null); }} onCancel={() => setEditingSec(null)} />}
              {sections.length === 0 ? (
                <div style={S.emptyState}><div style={{ fontSize: 48 }}>📂</div><h3 style={S.emptyTitle}>{t.noSections}</h3></div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {sections.map((sec) => (
                    <div key={sec.id} style={{ background: K.card, borderRadius: K.radius, border: `1.5px solid ${K.border}`, overflow: "hidden" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 18px" }}>
                        <span style={{ fontSize: 28 }}>{sec.emoji}</span>
                        <div style={{ flex: 1 }}>
                          <span style={{ fontWeight: 800, fontSize: 15, color: K.text, display: "block" }}>{sec.nameEn}</span>
                          <span style={{ fontSize: 12, color: K.textLight }}>{sec.nameZh} · {sec.subs.length} {t.subSections}</span>
                        </div>
                        <span style={{ fontSize: 12, color: K.textLight, fontWeight: 700 }}>{products.filter((p) => p.cat === sec.id).length} {t.items}</span>
                        <button onClick={() => setEditingSec(sec)} style={S.adminActionBtn}>{t.editSection}</button>
                        <button onClick={() => deleteSection(sec.id)} style={{ ...S.adminActionBtn, color: "#e74c3c", borderColor: "#ffcdd2" }}>{t.deleteSection}</button>
                      </div>
                      {sec.subs.length > 0 && (
                        <div style={{ padding: "0 18px 14px", display: "flex", flexWrap: "wrap", gap: 6 }}>
                          {sec.subs.map((sub) => (
                            <span key={sub.id} style={{ fontSize: 12, fontWeight: 600, padding: "4px 12px", background: K.bg, borderRadius: 16, color: K.textLight, border: `1px solid ${K.border}` }}>
                              {lang === "zh" ? sub.nameZh : sub.nameEn}
                              <span style={{ marginLeft: 6, fontSize: 11, color: K.primary }}>{products.filter((p) => p.cat === sec.id && p.subCat === sub.id).length}</span>
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {adminTab === "orders" && (
            <div>
              {/* View toggle + Client filter */}
              <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
                <button onClick={() => setAdminOrderView("list")} style={{ ...S.catBtn, ...(adminOrderView === "list" ? S.catBtnActive : {}) }}>📋 {t.viewByList}</button>
                <button onClick={() => setAdminOrderView("client")} style={{ ...S.catBtn, ...(adminOrderView === "client" ? S.catBtnActive : {}) }}>👥 {t.viewByClient}</button>
                {adminOrderView === "list" && (
                  <select style={{ ...S.input, width: "auto", padding: "6px 12px", fontSize: 13, marginLeft: "auto" }} value={adminOrderFilter} onChange={(e) => setAdminOrderFilter(e.target.value)}>
                    <option value="all">{t.allClients}</option>
                    {clientList.map((c) => <option key={c.username} value={c.username}>{c.company} (@{c.username})</option>)}
                  </select>
                )}
              </div>

              {/* Client card when filtered */}
              {adminOrderView === "list" && adminOrderFilter !== "all" && (() => {
                const ci = getClientInfo(adminOrderFilter);
                const co = orders.filter((o) => o.supplier === adminOrderFilter);
                return (
                  <div style={{ ...S.profileCard, marginBottom: 16, background: K.bg }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
                      <div>
                        <h3 style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 900, color: K.text }}>🏫 {ci.schoolName || ci.company || adminOrderFilter}</h3>
                        <span style={{ fontSize: 12, color: K.textLight }}>@{adminOrderFilter}</span>
                      </div>
                      <div style={{ display: "flex", gap: 20 }}>
                        <div style={{ textAlign: "center" }}>
                          <div style={{ fontSize: 22, fontWeight: 900, color: K.primary }}>{co.length}</div>
                          <div style={{ fontSize: 11, color: K.textLight, fontWeight: 700 }}>{t.totalOrders}</div>
                        </div>
                        <div style={{ textAlign: "center" }}>
                          <div style={{ fontSize: 22, fontWeight: 900, color: K.primary }}>RM {co.reduce((s, o) => s + o.total, 0).toFixed(2)}</div>
                          <div style={{ fontSize: 11, color: K.textLight, fontWeight: 700 }}>{t.totalSpent}</div>
                        </div>
                      </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 20px", marginTop: 12, paddingTop: 12, borderTop: `1px solid ${K.border}` }}>
                      {ci.email && <div><span style={{ fontSize: 11, fontWeight: 700, color: K.textLight }}>📧 {t.email}</span><div style={{ fontSize: 13, fontWeight: 600, color: K.text }}>{ci.email}</div></div>}
                      {ci.phone && <div><span style={{ fontSize: 11, fontWeight: 700, color: K.textLight }}>📞 {t.contactNumber}</span><div style={{ fontSize: 13, fontWeight: 600, color: K.text }}>{ci.phone}</div></div>}
                      {ci.address && <div style={{ gridColumn: "1/-1" }}><span style={{ fontSize: 11, fontWeight: 700, color: K.textLight }}>📍 {t.address}</span><div style={{ fontSize: 13, fontWeight: 600, color: K.text }}>{ci.address}</div></div>}
                    </div>
                  </div>
                );
              })()}

              {/* List view */}
              {adminOrderView === "list" && (
                <div style={S.ordersList}>
                  {filteredAdminOrders.length === 0 ? <div style={S.emptyState}><div style={{ fontSize: 48 }}>📋</div><h3 style={S.emptyTitle}>{t.noOrders}</h3></div> : filteredAdminOrders.map((order) => (
                    <div key={order.id} style={S.orderCard} onClick={() => { setViewingOrder(order); setPage("orders"); }}>
                      <div style={S.orderCardTop}>
                        <span style={S.orderId}>{order.id}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <select style={{ ...S.input, width: "auto", padding: "3px 8px", fontSize: 12, margin: 0 }} value={order.status} onClick={(e) => e.stopPropagation()} onChange={(e) => { e.stopPropagation(); updateOrderStatus(order.id, e.target.value); }}>{STATUSES.map((s) => <option key={s} value={s}>{t.statusMap[s]}</option>)}</select>
                          <span style={{ ...S.statusBadge, background: statusColor(order.status) + "22", color: statusColor(order.status) }}>{t.statusMap[order.status]}</span>
                        </div>
                      </div>
                      <div style={S.orderCardBody}>
                        <div>
                          <span style={{ ...S.orderInfo, fontWeight: 700, color: K.text }}>🏫 {order.company} <span style={{ fontWeight: 400, color: K.textLight }}>(@{order.supplier})</span></span>
                          <span style={S.orderInfo}>{t.date}: {order.date}{order.deliveryDate ? ` → ${t.deliveryDate}: ${order.deliveryDate}` : ""}</span>
                          <span style={S.orderInfo}>{order.items.map((i) => `${pName(i)} ×${i.qty}`).join(", ")}</span>
                          {(order.adminPo || order.invoiceNo) && (
                            <span style={S.orderInfo}>
                              {order.adminPo && <span style={{ marginRight: 12 }}>📋 PO: {order.adminPo}</span>}
                              {order.invoiceNo && <span>🧾 INV: {order.invoiceNo}</span>}
                              {order.invoiceFile && <span style={{ marginLeft: 8, color: "#3b82f6" }}>📎</span>}
                            </span>
                          )}
                        </div>
                        <span style={S.orderTotal}>RM {order.total.toFixed(2)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Client view */}
              {adminOrderView === "client" && (
                <div>
                  {clientList.length === 0 ? <div style={S.emptyState}><div style={{ fontSize: 48 }}>👥</div><h3 style={S.emptyTitle}>{t.noOrders}</h3></div> : (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 16 }}>
                      {clientList.map((client) => (
                        <div key={client.username} style={{ ...S.profileCard, cursor: "pointer", transition: "box-shadow 0.2s" }} onClick={() => { setAdminOrderFilter(client.username); setAdminOrderView("list"); }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                            <div>
                              <h3 style={{ margin: "0 0 2px", fontSize: 16, fontWeight: 900, color: K.text }}>🏫 {client.company}</h3>
                              <span style={{ fontSize: 12, color: K.textLight }}>@{client.username}</span>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontSize: 20, fontWeight: 900, color: K.primary }}>RM {client.totalSpent.toFixed(2)}</div>
                              <div style={{ fontSize: 11, color: K.textLight }}>{client.orderCount} {t.clientOrders}</div>
                            </div>
                          </div>
                          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 12, color: K.textLight }}>
                            {client.email && <span>📧 {client.email}</span>}
                            {client.phone && <span>📞 {client.phone}</span>}
                          </div>
                          {client.address && <div style={{ fontSize: 12, color: K.textLight, marginTop: 4 }}>📍 {client.address}</div>}
                          {client.lastOrder && <div style={{ fontSize: 11, color: K.textLight, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${K.border}` }}>Last order: {client.lastOrder}</div>}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {adminTab === "payments" && (() => {
            const calcOrderPayment = (o) => {
              const pays = (o.payments || []).reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
              const rets = (o.returns || []).reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
              const adjusted = o.total - rets;
              const outstanding = Math.max(0, adjusted - pays);
              const status = outstanding <= 0 && pays > 0 ? "paid" : pays > 0 ? "partial" : rets >= o.total ? "refunded" : (o.paymentDueDate && new Date(o.paymentDueDate) < new Date()) ? "overdue" : "unpaid";
              return { ...o, totalPaid: pays, totalReturns: rets, outstanding, calcStatus: status };
            };
            const enriched = orders.map(calcOrderPayment);
            const [payFilter, setPayFilter] = [adminOrderFilter, setAdminOrderFilter];
            const payStatusColors = { unpaid: "#f59e0b", partial: "#3b82f6", paid: "#10b981", overdue: "#e74c3c", refunded: "#8b5cf6" };
            const totalOutstanding = enriched.reduce((s, o) => s + o.outstanding, 0);
            const totalCollected = enriched.reduce((s, o) => s + o.totalPaid, 0);
            const totalRefunds = enriched.reduce((s, o) => s + o.totalReturns, 0);
            const overdueCount = enriched.filter((o) => o.calcStatus === "overdue").length;
            const filteredOrders = payFilter === "all" ? enriched : enriched.filter((o) => o.calcStatus === payFilter);

            // Client summaries
            const clientPaySummary = {};
            enriched.forEach((o) => {
              const key = o.supplier;
              if (!clientPaySummary[key]) {
                const ci = suppliers.find((s) => s.username === key) || {};
                clientPaySummary[key] = { username: key, company: ci.schoolName || ci.company || key, email: ci.email || "", phone: ci.phone || "", totalOrders: 0, totalAmount: 0, totalPaid: 0, totalReturns: 0, outstanding: 0, overdueCount: 0, proofCount: 0 };
              }
              clientPaySummary[key].totalOrders++;
              clientPaySummary[key].totalAmount += o.total;
              clientPaySummary[key].totalPaid += o.totalPaid;
              clientPaySummary[key].totalReturns += o.totalReturns;
              clientPaySummary[key].outstanding += o.outstanding;
              if (o.calcStatus === "overdue") clientPaySummary[key].overdueCount++;
              clientPaySummary[key].proofCount += (o.paymentProofs || []).length;
            });
            const clientList = Object.values(clientPaySummary);

            return (
              <div>
                {/* Summary cards */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 20 }}>
                  <div style={{ padding: 18, background: K.card, borderRadius: K.radius, border: `1.5px solid ${K.border}`, textAlign: "center" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: K.textLight, marginBottom: 6 }}>{t.totalOutstanding}</div>
                    <div style={{ fontSize: 26, fontWeight: 900, color: totalOutstanding > 0 ? "#e74c3c" : "#10b981" }}>RM {totalOutstanding.toFixed(2)}</div>
                  </div>
                  <div style={{ padding: 18, background: K.card, borderRadius: K.radius, border: `1.5px solid ${K.border}`, textAlign: "center" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: K.textLight, marginBottom: 6 }}>{t.totalCollected}</div>
                    <div style={{ fontSize: 26, fontWeight: 900, color: "#10b981" }}>RM {totalCollected.toFixed(2)}</div>
                  </div>
                  <div style={{ padding: 18, background: K.card, borderRadius: K.radius, border: `1.5px solid ${K.border}`, textAlign: "center" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: K.textLight, marginBottom: 6 }}>{t.totalRefunded}</div>
                    <div style={{ fontSize: 26, fontWeight: 900, color: "#8b5cf6" }}>RM {totalRefunds.toFixed(2)}</div>
                  </div>
                  <div style={{ padding: 18, background: overdueCount > 0 ? "#FEE2E2" : K.card, borderRadius: K.radius, border: `1.5px solid ${overdueCount > 0 ? "#FECACA" : K.border}`, textAlign: "center" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: K.textLight, marginBottom: 6 }}>{t.overdueOrders}</div>
                    <div style={{ fontSize: 26, fontWeight: 900, color: overdueCount > 0 ? "#e74c3c" : "#10b981" }}>{overdueCount}</div>
                    <div style={{ fontSize: 11, color: K.textLight }}>{t.overdueBanner}</div>
                  </div>
                </div>

                {/* Client payment summary cards */}
                <h3 style={{ fontSize: 16, fontWeight: 900, margin: "0 0 12px", color: K.text }}>👥 {t.clientSummary}</h3>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 12, marginBottom: 24 }}>
                  {clientList.map((c) => (
                    <div key={c.username} style={{ background: K.card, borderRadius: K.radius, padding: "16px 20px", border: `1.5px solid ${K.border}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                        <div>
                          <h4 style={{ margin: "0 0 2px", fontSize: 15, fontWeight: 800, color: K.text }}>{c.company}</h4>
                          <span style={{ fontSize: 11, color: K.textLight }}>@{c.username}{c.email ? ` · ${c.email}` : ""}</span>
                        </div>
                        {c.overdueCount > 0 && <span style={{ fontSize: 11, fontWeight: 800, background: "#FEE2E2", color: "#e74c3c", borderRadius: 6, padding: "2px 8px" }}>⚠️ {c.overdueCount} {t.overdueOrders}</span>}
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, fontSize: 12 }}>
                        <div style={{ padding: 8, background: K.bg, borderRadius: 8, textAlign: "center" }}>
                          <div style={{ fontWeight: 700, color: K.textLight, fontSize: 10, marginBottom: 2 }}>{t.originalAmount}</div>
                          <div style={{ fontWeight: 900, color: K.text }}>RM {c.totalAmount.toFixed(2)}</div>
                        </div>
                        <div style={{ padding: 8, background: "#DCFCE7", borderRadius: 8, textAlign: "center" }}>
                          <div style={{ fontWeight: 700, color: "#166534", fontSize: 10, marginBottom: 2 }}>{t.totalPaid}</div>
                          <div style={{ fontWeight: 900, color: "#166534" }}>RM {c.totalPaid.toFixed(2)}</div>
                        </div>
                        <div style={{ padding: 8, background: c.outstanding > 0 ? "#FEE2E2" : "#DCFCE7", borderRadius: 8, textAlign: "center" }}>
                          <div style={{ fontWeight: 700, color: c.outstanding > 0 ? "#991B1B" : "#166534", fontSize: 10, marginBottom: 2 }}>{t.balance}</div>
                          <div style={{ fontWeight: 900, color: c.outstanding > 0 ? "#991B1B" : "#166534" }}>RM {c.outstanding.toFixed(2)}</div>
                        </div>
                      </div>
                      {c.proofCount > 0 && <div style={{ marginTop: 8, fontSize: 11, color: "#3b82f6", fontWeight: 700 }}>🧾 {c.proofCount} {t.proofOfPayment}</div>}
                    </div>
                  ))}
                </div>

                {/* Filter bar */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 900, margin: 0, color: K.text }}>📋 {t.ordersSummary}</h3>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    <button onClick={() => setAdminOrderFilter("all")} style={{ ...S.catBtn, ...(payFilter === "all" ? S.catBtnActive : {}), fontSize: 12, padding: "4px 12px" }}>{t.allStatuses}</button>
                    {["unpaid", "partial", "overdue", "paid", "refunded"].map((s) => (
                      <button key={s} onClick={() => setAdminOrderFilter(s)} style={{ ...S.catBtn, ...(payFilter === s ? { background: payStatusColors[s], borderColor: payStatusColors[s], color: "#fff" } : {}), fontSize: 12, padding: "4px 12px" }}>
                        {t.paymentStatusMap[s]}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Order payment list */}
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {filteredOrders.length === 0 ? (
                    <div style={S.emptyState}><div style={{ fontSize: 48 }}>💰</div><h3 style={S.emptyTitle}>{t.noOrders}</h3></div>
                  ) : filteredOrders.map((o) => (
                    <div key={o.id} style={{ background: K.card, borderRadius: K.radius, padding: "14px 18px", border: `1.5px solid ${K.border}`, cursor: "pointer" }} onClick={() => { setViewingOrder(o); setPage("orders"); }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, flexWrap: "wrap", gap: 6 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ fontWeight: 800, fontSize: 13, color: K.text }}>{o.id}</span>
                          <span style={{ fontSize: 12, color: K.textLight }}>{o.company}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          {(o.paymentProofs || []).length > 0 && <span style={{ fontSize: 11, fontWeight: 700, color: "#3b82f6", background: "#EBF5FF", borderRadius: 6, padding: "2px 6px" }}>🧾 {(o.paymentProofs || []).length}</span>}
                          <span style={{ fontSize: 12, fontWeight: 800, borderRadius: 6, padding: "3px 10px", background: (payStatusColors[o.calcStatus] || "#9ca3af") + "22", color: payStatusColors[o.calcStatus] || "#9ca3af" }}>{t.paymentStatusMap[o.calcStatus]}</span>
                        </div>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 8 }}>
                        <div style={{ fontSize: 12, color: K.textLight }}>
                          <span>{t.date}: {o.date}</span>
                          {o.paymentDueDate && <span style={{ marginLeft: 12, color: o.calcStatus === "overdue" ? "#e74c3c" : K.textLight, fontWeight: o.calcStatus === "overdue" ? 700 : 400 }}>{o.calcStatus === "overdue" ? "⚠️ " : "📅 "}{t.paymentDueDate}: {o.paymentDueDate}</span>}
                          {o.invoiceNo && <span style={{ marginLeft: 12 }}>🧾 {o.invoiceNo}</span>}
                        </div>
                        <div style={{ display: "flex", gap: 16, fontSize: 13 }}>
                          {o.totalReturns > 0 && <span style={{ color: "#92400E", fontWeight: 700 }}>↩ RM {o.totalReturns.toFixed(2)}</span>}
                          <span style={{ color: "#10b981", fontWeight: 700 }}>✓ RM {o.totalPaid.toFixed(2)}</span>
                          <span style={{ color: o.outstanding > 0 ? "#e74c3c" : "#10b981", fontWeight: 900 }}>{t.balance}: RM {o.outstanding.toFixed(2)}</span>
                        </div>
                      </div>
                      {/* Mini progress bar */}
                      <div style={{ marginTop: 8, height: 4, background: "#eee", borderRadius: 2, overflow: "hidden" }}>
                        <div style={{ height: "100%", borderRadius: 2, background: o.outstanding <= 0 ? "#10b981" : o.totalPaid > 0 ? "#3b82f6" : "#e5e7eb", width: o.total > 0 ? `${Math.min(100, (o.totalPaid / Math.max(0.01, o.total - o.totalReturns)) * 100)}%` : "0%", transition: "width 0.3s" }} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {adminTab === "suppliers" && (
            <div>
              <button onClick={() => setEditingSupplier({ username: "", password: "", company: "", schoolName: "", address: "", phone: "", email: "", _isNew: true })} style={S.adminAddBtn}>{t.addSupplier}</button>
              {editingSupplier && <SupplierForm supplier={editingSupplier} onSave={saveSupplier} onCancel={() => setEditingSupplier(null)} />}
              <div style={S.adminTable}>
                {suppliers.map((s) => (
                  <div key={s.username} style={S.adminRow}>
                    <span style={{ fontSize: 20, minWidth: 36 }}>{s.role === "admin" ? "👑" : "🏪"}</span>
                    <div style={{ flex: 1 }}>
                      <span style={{ fontWeight: 700, fontSize: 14, display: "block" }}>{s.schoolName || s.company || s.username}</span>
                      <span style={{ color: K.textLight, fontSize: 12 }}>@{s.username} · {s.email || "—"} · {s.phone || "—"}</span>
                    </div>
                    {s.role !== "admin" && (
                      <>
                        <button onClick={() => setEditingSupplier(s)} style={S.adminActionBtn}>{t.editProduct}</button>
                        <button onClick={() => deleteSupplier(s.username)} style={{ ...S.adminActionBtn, color: "#e74c3c", borderColor: "#ffcdd2" }}>{t.deleteProduct}</button>
                      </>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
